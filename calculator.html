<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    :root,
    [data-theme="dark"] {
      --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --bg-calculator: #1e1e2f;
      --shadow-calculator: 0 20px 60px rgba(0, 0, 0, 0.5);
      --bg-display: #12121a;
      --text-expression: #888;
      --text-result: #fff;
      --btn-num-bg: #2d2d44;
      --btn-num-hover: #3d3d5c;
      --btn-num-text: #fff;
      --btn-equals-bg: #0f3460;
      --btn-equals-hover: #1a4a7a;
      --theme-toggle-bg: #2d2d44;
      --theme-toggle-hover: #3d3d5c;
      --theme-toggle-text: #fff;
      --bg-history: #12121a;
      --text-history-title: #aaa;
      --text-history-entry: #ddd;
      --text-history-time: #666;
      --border-history: #2d2d44;
      --btn-history-clear-bg: #2d2d44;
      --btn-history-clear-hover: #3d3d5c;
      --btn-history-clear-text: #ccc;
    }

    [data-theme="light"] {
      --bg-body: linear-gradient(135deg, #e8eef5 0%, #d4e0ed 50%, #c5d5e8 100%);
      --bg-calculator: #f5f7fa;
      --shadow-calculator: 0 20px 60px rgba(0, 0, 0, 0.12);
      --bg-display: #ffffff;
      --text-expression: #6b7280;
      --text-result: #111827;
      --btn-num-bg: #e5e7eb;
      --btn-num-hover: #d1d5db;
      --btn-num-text: #111827;
      --btn-equals-bg: #2563eb;
      --btn-equals-hover: #1d4ed8;
      --theme-toggle-bg: #e5e7eb;
      --theme-toggle-hover: #d1d5db;
      --theme-toggle-text: #111827;
      --bg-history: #ffffff;
      --text-history-title: #374151;
      --text-history-entry: #111827;
      --text-history-time: #9ca3af;
      --border-history: #e5e7eb;
      --btn-history-clear-bg: #e5e7eb;
      --btn-history-clear-hover: #d1d5db;
      --btn-history-clear-text: #374151;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg-body);
      transition: background 0.3s ease;
    }

    .app {
      display: flex;
      align-items: stretch;
      gap: 20px;
      max-width: 100%;
    }

    .calculator {
      width: 320px;
      background: var(--bg-calculator);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-calculator);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .calculator-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .theme-toggle {
      background: var(--theme-toggle-bg);
      color: var(--theme-toggle-text);
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    .theme-toggle:hover {
      background: var(--theme-toggle-hover);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    .display {
      background: var(--bg-display);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: background 0.3s ease;
    }

    .expression {
      color: var(--text-expression);
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
      transition: color 0.3s ease;
    }

    .result {
      color: var(--text-result);
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
      transition: color 0.3s ease;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 18px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-num {
      background: var(--btn-num-bg);
      color: var(--btn-num-text);
    }

    .btn-num:hover {
      background: var(--btn-num-hover);
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-op:hover {
      background: #ff6b81;
    }

    .btn-func {
      background: #533483;
      color: #fff;
    }

    .btn-func:hover {
      background: #6b44a8;
    }

    .btn-clear {
      background: #dc2626;
    }

    .btn-clear:hover {
      background: #ef4444;
    }

    .btn-equals {
      background: var(--btn-equals-bg);
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover {
      background: var(--btn-equals-hover);
    }

    .btn-zero {
      grid-column: span 2;
    }

    .history {
      width: 280px;
      background: var(--bg-calculator);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-calculator);
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .history-title {
      color: var(--text-history-title);
      font-size: 16px;
      font-weight: 600;
    }

    .history-clear {
      background: var(--btn-history-clear-bg);
      color: var(--btn-history-clear-text);
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-clear:hover {
      background: var(--btn-history-clear-hover);
    }

    .history-list {
      list-style: none;
      flex: 1;
      min-height: 320px;
      max-height: 420px;
      overflow-y: auto;
      background: var(--bg-history);
      border-radius: 10px;
      padding: 8px;
      transition: background 0.3s ease;
    }

    .history-empty {
      color: var(--text-history-time);
      font-size: 13px;
      text-align: center;
      padding: 24px 12px;
    }

    .history-item {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-history);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-expression {
      color: var(--text-history-entry);
      font-size: 14px;
      word-break: break-all;
    }

    .history-time {
      color: var(--text-history-time);
      font-size: 11px;
      margin-top: 4px;
    }

    @media (max-width: 680px) {
      .app {
        flex-direction: column;
        align-items: center;
      }

      .history {
        width: 320px;
      }

      .history-list {
        min-height: 160px;
        max-height: 200px;
      }
    }
  </style>
  <script>
    (function () {
      const key = "calculator-theme";
      const saved = localStorage.getItem(key);
      const theme =
        saved === "light" || saved === "dark"
          ? saved
          : window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>
<body>
  <div class="app">
  <div class="calculator">
    <div class="calculator-header">
      <button
        type="button"
        class="theme-toggle"
        id="themeToggle"
        aria-label="Переключить тему"
        title="Переключить тему"
      >🌙</button>
    </div>
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-func btn-clear" data-action="clear">C</button>
      <button class="btn-func" data-action="backspace">⌫</button>
      <button class="btn-func" data-action="percent">%</button>
      <button class="btn-op" data-action="operator" data-value="/">÷</button>

      <button class="btn-num" data-action="digit" data-value="7">7</button>
      <button class="btn-num" data-action="digit" data-value="8">8</button>
      <button class="btn-num" data-action="digit" data-value="9">9</button>
      <button class="btn-op" data-action="operator" data-value="*">×</button>

      <button class="btn-num" data-action="digit" data-value="4">4</button>
      <button class="btn-num" data-action="digit" data-value="5">5</button>
      <button class="btn-num" data-action="digit" data-value="6">6</button>
      <button class="btn-op" data-action="operator" data-value="-">−</button>

      <button class="btn-num" data-action="digit" data-value="1">1</button>
      <button class="btn-num" data-action="digit" data-value="2">2</button>
      <button class="btn-num" data-action="digit" data-value="3">3</button>
      <button class="btn-op" data-action="operator" data-value="+">+</button>

      <button class="btn-num btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn-num" data-action="decimal">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <aside class="history">
    <div class="history-header">
      <h2 class="history-title">Журнал операций</h2>
      <button type="button" class="history-clear" id="clearHistory">Очистить</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </aside>
  </div>

  <script>
    const THEME_KEY = "calculator-theme";
    const HISTORY_KEY = "calculator-history";
    const MAX_HISTORY = 50;
    const themeToggle = document.getElementById("themeToggle");

    function getPreferredTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "light" || saved === "dark") return saved;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    function updateThemeToggleIcon(theme) {
      themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
      themeToggle.setAttribute(
        "aria-label",
        theme === "dark" ? "Включить светлую тему" : "Включить тёмную тему"
      );
      themeToggle.title = themeToggle.getAttribute("aria-label");
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      updateThemeToggleIcon(theme);
    }

    setTheme(getPreferredTheme());

    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      setTheme(current === "dark" ? "light" : "dark");
    });

    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const historyListEl = document.getElementById("historyList");
    const clearHistoryBtn = document.getElementById("clearHistory");

    const OP_SYMBOLS = { "+": "+", "-": "−", "*": "×", "/": "÷" };

    let currentValue = "0";
    let previousValue = "";
    let operator = null;
    let waitingForOperand = false;
    let history = [];

    function loadHistory() {
      try {
        const saved = localStorage.getItem(HISTORY_KEY);
        history = saved ? JSON.parse(saved) : [];
        if (!Array.isArray(history)) history = [];
      } catch {
        history = [];
      }
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function formatExpression(prev, op, curr) {
      return `${prev} ${OP_SYMBOLS[op]} ${curr}`;
    }

    function renderHistory() {
      if (history.length === 0) {
        historyListEl.innerHTML =
          '<li class="history-empty">Пока нет операций</li>';
        return;
      }

      historyListEl.innerHTML = history
        .map(
          (entry) => `
            <li class="history-item">
              <div class="history-expression">${entry.text}</div>
              <div class="history-time">${formatTime(entry.time)}</div>
            </li>
          `
        )
        .join("");
    }

    function addHistoryEntry(text) {
      history.unshift({ text, time: Date.now() });
      if (history.length > MAX_HISTORY) {
        history.length = MAX_HISTORY;
      }
      saveHistory();
      renderHistory();
    }

    function clearHistory() {
      history = [];
      saveHistory();
      renderHistory();
    }

    loadHistory();
    renderHistory();
    clearHistoryBtn.addEventListener("click", clearHistory);

    function updateDisplay() {
      resultEl.textContent = currentValue;
      if (previousValue && operator) {
        const opSymbol = OP_SYMBOLS[operator];
        expressionEl.textContent = `${previousValue} ${opSymbol}`;
      } else {
        expressionEl.textContent = "";
      }
    }

    function inputDigit(digit) {
      if (waitingForOperand) {
        currentValue = digit;
        waitingForOperand = false;
      } else {
        currentValue = currentValue === "0" ? digit : currentValue + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (waitingForOperand) {
        currentValue = "0.";
        waitingForOperand = false;
        updateDisplay();
        return;
      }
      if (!currentValue.includes(".")) {
        currentValue += ".";
        updateDisplay();
      }
    }

    function clear() {
      currentValue = "0";
      previousValue = "";
      operator = null;
      waitingForOperand = false;
      updateDisplay();
    }

    function backspace() {
      if (waitingForOperand) return;
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = "0";
      }
      updateDisplay();
    }

    function percent() {
      currentValue = String(parseFloat(currentValue) / 100);
      updateDisplay();
    }

    function setOperator(op) {
      const input = parseFloat(currentValue);

      if (operator && !waitingForOperand) {
        calculate();
      }

      previousValue = String(parseFloat(currentValue));
      operator = op;
      waitingForOperand = true;
      updateDisplay();
    }

    function calculate() {
      if (!operator || previousValue === "") return;

      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      const op = operator;
      const expression = formatExpression(previousValue, op, curr);
      let result;

      switch (op) {
        case "+": result = prev + curr; break;
        case "-": result = prev - curr; break;
        case "*": result = prev * curr; break;
        case "/":
          if (curr === 0) {
            addHistoryEntry(`${expression} = Ошибка`);
            currentValue = "Ошибка";
            previousValue = "";
            operator = null;
            waitingForOperand = true;
            updateDisplay();
            return;
          }
          result = prev / curr;
          break;
      }

      const resultStr = String(parseFloat(result.toPrecision(12)));
      addHistoryEntry(`${expression} = ${resultStr}`);
      currentValue = resultStr;
      previousValue = "";
      operator = null;
      waitingForOperand = true;
      expressionEl.textContent = "";
      updateDisplay();
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const action = btn.dataset.action;
      const value = btn.dataset.value;

      switch (action) {
        case "digit": inputDigit(value); break;
        case "decimal": inputDecimal(); break;
        case "operator": setOperator(value); break;
        case "equals": calculate(); break;
        case "clear": clear(); break;
        case "backspace": backspace(); break;
        case "percent": percent(); break;
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key >= "0" && e.key <= "9") inputDigit(e.key);
      else if (e.key === ".") inputDecimal();
      else if (e.key === "+") setOperator("+");
      else if (e.key === "-") setOperator("-");
      else if (e.key === "*") setOperator("*");
      else if (e.key === "/") { e.preventDefault(); setOperator("/"); }
      else if (e.key === "Enter" || e.key === "=") calculate();
      else if (e.key === "Escape") clear();
      else if (e.key === "Backspace") backspace();
      else if (e.key === "%") percent();
    });
  </script>
</body>
</html>
