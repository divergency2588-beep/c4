<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .calculator {
      width: 320px;
      background: #1e1e2f;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .display {
      background: #12121a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .expression {
      color: #888;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .result {
      color: #fff;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 18px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-num {
      background: #2d2d44;
      color: #fff;
    }

    .btn-num:hover {
      background: #3d3d5c;
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-op:hover {
      background: #ff6b81;
    }

    .btn-func {
      background: #533483;
      color: #fff;
    }

    .btn-func:hover {
      background: #6b44a8;
    }

    .btn-clear {
      background: #dc2626;
    }

    .btn-clear:hover {
      background: #ef4444;
    }

    .btn-equals {
      background: #0f3460;
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover {
      background: #1a4a7a;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-func btn-clear" data-action="clear">C</button>
      <button class="btn-func" data-action="backspace">⌫</button>
      <button class="btn-func" data-action="percent">%</button>
      <button class="btn-op" data-action="operator" data-value="/">÷</button>

      <button class="btn-num" data-action="digit" data-value="7">7</button>
      <button class="btn-num" data-action="digit" data-value="8">8</button>
      <button class="btn-num" data-action="digit" data-value="9">9</button>
      <button class="btn-op" data-action="operator" data-value="*">×</button>

      <button class="btn-num" data-action="digit" data-value="4">4</button>
      <button class="btn-num" data-action="digit" data-value="5">5</button>
      <button class="btn-num" data-action="digit" data-value="6">6</button>
      <button class="btn-op" data-action="operator" data-value="-">−</button>

      <button class="btn-num" data-action="digit" data-value="1">1</button>
      <button class="btn-num" data-action="digit" data-value="2">2</button>
      <button class="btn-num" data-action="digit" data-value="3">3</button>
      <button class="btn-op" data-action="operator" data-value="+">+</button>

      <button class="btn-num btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn-num" data-action="decimal">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");

    let currentValue = "0";
    let previousValue = "";
    let operator = null;
    let waitingForOperand = false;

    function updateDisplay() {
      resultEl.textContent = currentValue;
      if (previousValue && operator) {
        const opSymbol = { "+": "+", "-": "−", "*": "×", "/": "÷" }[operator];
        expressionEl.textContent = `${previousValue} ${opSymbol}`;
      } else {
        expressionEl.textContent = "";
      }
    }

    function inputDigit(digit) {
      if (waitingForOperand) {
        currentValue = digit;
        waitingForOperand = false;
      } else {
        currentValue = currentValue === "0" ? digit : currentValue + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (waitingForOperand) {
        currentValue = "0.";
        waitingForOperand = false;
        updateDisplay();
        return;
      }
      if (!currentValue.includes(".")) {
        currentValue += ".";
        updateDisplay();
      }
    }

    function clear() {
      currentValue = "0";
      previousValue = "";
      operator = null;
      waitingForOperand = false;
      updateDisplay();
    }

    function backspace() {
      if (waitingForOperand) return;
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = "0";
      }
      updateDisplay();
    }

    function percent() {
      currentValue = String(parseFloat(currentValue) / 100);
      updateDisplay();
    }

    function setOperator(op) {
      const input = parseFloat(currentValue);

      if (operator && !waitingForOperand) {
        calculate();
      }

      previousValue = String(parseFloat(currentValue));
      operator = op;
      waitingForOperand = true;
      updateDisplay();
    }

    function calculate() {
      if (!operator || previousValue === "") return;

      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      let result;

      switch (operator) {
        case "+": result = prev + curr; break;
        case "-": result = prev - curr; break;
        case "*": result = prev * curr; break;
        case "/":
          if (curr === 0) {
            currentValue = "Ошибка";
            previousValue = "";
            operator = null;
            waitingForOperand = true;
            updateDisplay();
            return;
          }
          result = prev / curr;
          break;
      }

      currentValue = String(parseFloat(result.toPrecision(12)));
      previousValue = "";
      operator = null;
      waitingForOperand = true;
      expressionEl.textContent = "";
      updateDisplay();
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const action = btn.dataset.action;
      const value = btn.dataset.value;

      switch (action) {
        case "digit": inputDigit(value); break;
        case "decimal": inputDecimal(); break;
        case "operator": setOperator(value); break;
        case "equals": calculate(); break;
        case "clear": clear(); break;
        case "backspace": backspace(); break;
        case "percent": percent(); break;
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key >= "0" && e.key <= "9") inputDigit(e.key);
      else if (e.key === ".") inputDecimal();
      else if (e.key === "+") setOperator("+");
      else if (e.key === "-") setOperator("-");
      else if (e.key === "*") setOperator("*");
      else if (e.key === "/") { e.preventDefault(); setOperator("/"); }
      else if (e.key === "Enter" || e.key === "=") calculate();
      else if (e.key === "Escape") clear();
      else if (e.key === "Backspace") backspace();
      else if (e.key === "%") percent();
    });
  </script>
</body>
</html>
